{% load company_filters %}
<!-- Reusable Technology Icons Component -->
<div v-if="technologies" class="flex flex-wrap gap-2 justify-left mb-3">
    <template v-for="tech in splitTechnologies(technologies)">
        <span v-if="getTechIcon(tech)" 
              class="inline-flex items-center px-2 py-1 rounded text-xs bg-gray-100 text-gray-700" 
              :title="tech">
            <img :src="getTechIcon(tech)" :alt="tech" class="w-4 h-4">
        </span>
        <span v-else 
              class="inline-flex items-center px-2 py-1 rounded text-xs bg-blue-100 text-blue-700 font-medium" 
              :title="tech">
            {% verbatim %}{{ tech }}{% endverbatim %}
        </span>
    </template>
</div>
