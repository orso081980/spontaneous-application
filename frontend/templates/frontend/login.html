{% extends 'frontend/base.html' %}

{% block title %}Login - Spontaneous Job Board{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-6 text-center">Login</h1>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                Username *
            </label>
            <input type="text" id="username" name="username" required
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                Password *
            </label>
            <input type="password" id="password" name="password" required
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <button type="submit"
            class="w-full bg-indigo-600 text-white hover:bg-indigo-700 px-4 py-2 rounded-md font-medium">
            Login
        </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-600">
        Don't have an account?
        <a href="{% url 'frontend:register' %}" class="text-indigo-600 hover:text-indigo-800 font-medium">
            Register here
        </a>
    </p>
</div>
{% endblock %}
